<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Data Utils - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-6">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">
      <h1 class="text-2xl font-bold mb-4">Demo: Data Utilities</h1>

      <div class="mb-4">
        <label class="block font-medium mb-1">Filtrar por categoría</label>
        <select id="category" class="border p-2 rounded w-full">
          <option value="">(todas)</option>
        </select>
      </div>

      <div class="flex gap-2 mb-4">
        <button id="btn-count" class="px-4 py-2 bg-blue-600 text-white rounded">Contar por categoría</button>
        <button id="btn-inv" class="px-4 py-2 bg-green-600 text-white rounded">Valor inventario</button>
        <button id="btn-sales" class="px-4 py-2 bg-indigo-600 text-white rounded">Ventas por producto</button>
        <button id="btn-validate" class="px-4 py-2 bg-red-600 text-white rounded">Validar datos</button>
      </div>

      <pre id="output" class="bg-gray-50 border p-4 rounded h-64 overflow-auto text-sm"></pre>
    </div>

    <script src="app.js"></script>
  </body>
</html>
